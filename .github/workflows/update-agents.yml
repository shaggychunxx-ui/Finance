name: Update Agent Data

# Runs every existing Finance intelligence agent on a schedule, checks whether
# any of the generated reports changed, and commits/pushes the refreshed data
# so the World Events Tracker (index.html) and other consumers always have
# up-to-date output without requiring a manual run.

on:
  schedule:
    - cron: '0 * * * *' # every hour, on the hour
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-agent-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run all agents
        run: python scripts/update_all_agents.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "chore: hourly agent data refresh"
            git push
          fi
